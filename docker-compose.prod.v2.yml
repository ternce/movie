# ============================================
# MoviePlatform — Production Docker Compose (V2 side-by-side)
# Purpose: run a second stack in parallel with the existing one.
# Notes:
# - Removed fixed container_name values to avoid name collisions.
# - Removed fixed network name to allow project-prefixed resources.
# - Nginx publishes on a non-80 port by default.
# Usage:
#   docker compose -f docker-compose.prod.v2.yml --env-file .env.production up -d --build
# Optional:
#   MP_V2_HTTP_PORT=8080 docker compose -f docker-compose.prod.v2.yml --env-file .env.production up -d --build
# ============================================

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    restart: always
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command: [
      "sh",
      "-c",
      "exec redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru ${REDIS_PASSWORD:+--requirepass \"$REDIS_PASSWORD\"}"
    ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'if [ -n "$REDIS_PASSWORD" ]; then redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG; else redis-cli ping | grep -q PONG; fi']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  minio:
    image: minio/minio:latest
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb local/videos --ignore-existing;
      mc mb local/thumbnails --ignore-existing;
      mc mb local/documents --ignore-existing;
      mc mb local/avatars --ignore-existing;
      mc anonymous set download local/videos;
      mc anonymous set download local/thumbnails;
      mc anonymous set download local/avatars;
      echo 'MinIO buckets created successfully';
      exit 0;
      "
    networks:
      - internal

  mailpit:
    image: axllent/mailpit:latest
    restart: always
    environment:
      - MP_SMTP_AUTH_ACCEPT_ANY=true
      - MP_SMTP_AUTH_ALLOW_INSECURE=true
    volumes:
      - mailpit_data:/data
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 128M

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRATION=${JWT_ACCESS_EXPIRATION:-15m}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION:-7d}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET_VIDEOS=videos
      - MINIO_BUCKET_THUMBNAILS=thumbnails
      - MINIO_BUCKET_DOCUMENTS=documents
      - MINIO_BUCKET_AVATARS=avatars
      - UPLOAD_DIR=/app/apps/api/uploads
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:?MINIO_PUBLIC_ENDPOINT must be set to a browser-accessible URL}
      - VIDEO_PROCESSING_CONCURRENCY=${VIDEO_PROCESSING_CONCURRENCY:-1}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - SMTP_HOST=${SMTP_HOST:-mailpit}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@movieplatform.ru}
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS:-12}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-60000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-100}
      - EDGECENTER_API_KEY=${EDGECENTER_API_KEY:-}
      - EDGECENTER_CDN_HOSTNAME=${EDGECENTER_CDN_HOSTNAME:-}
      - EDGECENTER_CDN_SECRET=${EDGECENTER_CDN_SECRET:-}
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID:-}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY:-}
      - YOOKASSA_MOCK_MODE=${YOOKASSA_MOCK_MODE:-true}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-MoviePlatform}
      - APP_URL=${APP_URL}
      - PORT=4000
    volumes:
      - api_video_uploads:/tmp/video-uploads
      - api_uploads_v2:/app/apps/api/uploads
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:4000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 2G

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
        - NEXT_PUBLIC_MINIO_URL=${NEXT_PUBLIC_MINIO_URL:-}
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - NEXT_PUBLIC_MINIO_URL=${NEXT_PUBLIC_MINIO_URL:-}
    depends_on:
      - api
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1G

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - '${MP_V2_HTTP_PORT:-8080}:80'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
      - minio
      - mailpit
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  api_video_uploads:
    driver: local
  api_uploads_v2:
    driver: local
  mailpit_data:
    driver: local

networks:
  internal:
    driver: bridge
